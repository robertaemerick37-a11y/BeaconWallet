<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='90'>💳</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

  <div class="auth-container">
    <div class="auth-card">
      <h2>Reset Your Password</h2>
      <p id="reset-info" class="verification-subtext"></p>
      <div id="error-message" class="error-message hidden"></div>
      
      <form id="reset-form">
        <div class="input-group">
          <label for="recovery-code">4-Digit Recovery Code</label>
          <input type="text" id="recovery-code" maxlength="4" placeholder="1234" required>
        </div>
        <div class="input-group">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" required>
        </div>
        <div class="input-group">
          <label for="confirm-password">Confirm New Password</label>
          <input type="password" id="confirm-password" required>
        </div>
        <button type="submit" class="submit-btn">Update Password</button>
      </form>
    </div>
  </div>

  <script>
    const resetForm = document.getElementById('reset-form');
    const errorMessage = document.getElementById('error-message');
    const resetInfo = document.getElementById('reset-info');

    const params = new URLSearchParams(window.location.search);
    const resetEmail = params.get('email');
    const resetCode = params.get('code');

    if (resetEmail) {
      localStorage.setItem('resetEmail', resetEmail);
      resetInfo.textContent = `Reset link opened for ${resetEmail}. Enter your recovery code and new password.`;
    } else if (localStorage.getItem('resetEmail')) {
      resetInfo.textContent = `Reset link opened for ${localStorage.getItem('resetEmail')}. Enter your recovery code and new password.`;
    } else {
      resetInfo.textContent = 'Start password reset from the login page or use the link sent to your email.';
    }

    if (resetCode) {
      document.getElementById('recovery-code').value = resetCode;
    }

    const resetSubmitBtn = resetForm.querySelector('button[type="submit"]');

    function setLoading(button, isLoading, loadingText) {
      if (!button) return;
      if (!button.dataset.originalText) button.dataset.originalText = button.textContent;
      const labelEl = button.querySelector('.btn-label');
      if (isLoading) {
        button.classList.add('loading');
        if (labelEl) labelEl.textContent = loadingText || 'Processing...';
        else button.textContent = loadingText || 'Processing...';
      } else {
        button.classList.remove('loading');
        if (labelEl) labelEl.textContent = button.dataset.originalText;
        else button.textContent = button.dataset.originalText;
      }
    }

    resetForm.addEventListener('submit', (e) => {
      e.preventDefault();
      errorMessage.classList.add('hidden');

      const code = document.getElementById('recovery-code').value;
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const email = localStorage.getItem('resetEmail');

      if (!email) {
        errorMessage.textContent = 'Session expired. Please start over.';
        errorMessage.classList.remove('hidden');
        return;
      }

      if (newPassword !== confirmPassword) {
        errorMessage.textContent = "Passwords do not match!";
        errorMessage.classList.remove('hidden');
        return;
      }

      setLoading(resetSubmitBtn, true, 'Updating...');
      fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, code: code, newPassword: newPassword })
      })
      .then(async (response) => {
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Reset failed.');

        setLoading(resetSubmitBtn, false);
        alert('Password updated successfully! Please log in with your new password.');
        localStorage.removeItem('resetEmail');
        window.location.href = 'index.html'; // Send back to login
      })
      .catch((err) => {
        setLoading(resetSubmitBtn, false);
        errorMessage.textContent = err.message;
        errorMessage.classList.remove('hidden');
      });
    });
  </script>

  <!-- Site footer with legal links -->
  <footer class="site-footer">
    <div class="footer-links">
      <a href="terms.html">Terms of Service</a>
      <span>&middot;</span>
      <a href="privacy.html">Privacy Policy</a>
    </div>
  </footer>
</body>
</html>
