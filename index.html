<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - Auth System</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='90'>💳</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

  <header class="main-header auth-header">
    <div class="header-inner">
      <div class="header-logo">
<h1>💳 Beacon Wealth</h1>
      </div>
    </div>
  </header>

  <div class="auth-container">
    <div class="auth-card">
      <h2 id="form-title">Welcome Back</h2>
      
      <div id="error-message" class="error-message hidden"></div>

      <form id="auth-form">
        
        <div class="input-group">
          <label id="username-label" for="username">Username or Email</label>
          <input type="text" id="username" required>
        </div>

        <div class="input-group hidden" id="email-group">
          <label for="email">Email Address</label>
          <input type="email" id="email">
        </div>

        <div class="input-group">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <label for="password" style="margin-bottom: 0;">Password</label>
            <a href="#" id="forgot-password-link" style="font-size: 13px; color: #0056b3; text-decoration: none;">Forgot Password?</a>
          </div>
          <input type="password" id="password" required>
        </div>

        <div class="input-group hidden" id="confirm-password-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password">
        </div>

        <button type="submit" id="submit-btn" class="submit-btn">Log In</button>
      </form>

      <div class="auth-toggle">
        <p id="toggle-text">
          Don't have an account? 
          <a href="#" id="toggle-link">Create Account</a>
        </p>
      </div>

    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div id="forgot-password-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-card">
      <h3>Reset Your Password</h3>
      <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Enter your email address to receive a recovery code.</p>
      
      <div id="modal-error-message" class="error-message hidden"></div>
      
      <form id="forgot-password-form">
        <div class="input-group">
          <label for="modal-email">Email Address</label>
          <input type="email" id="modal-email" required>
        </div>
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
          <button type="button" id="modal-cancel-btn" class="modal-cancel-btn">Cancel</button>
          <button type="submit" class="submit-btn">Send Recovery Code</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>

  <!-- Site footer with legal links -->
  <footer class="site-footer">
    <div class="footer-links">
      <a href="terms.html">Terms of Service</a>
      <span>&middot;</span>
      <a href="privacy.html">Privacy Policy</a>
    </div>
  </footer>
</body>
</html>
